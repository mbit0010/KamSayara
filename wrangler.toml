name = "kamsayara"
main = "worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Static assets binding — serves index.html, styles.css, app.js
[assets]
directory = "./"
binding   = "ASSETS"

# Production routes
[[routes]]
pattern = "www.kamsayara.com/*"
zone_name = "kamsayara.com"

[[routes]]
pattern = "kamsayara.com/*"
zone_name = "kamsayara.com"

# Workers.dev fallback (keep for testing)
workers_dev = true
